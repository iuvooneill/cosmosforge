---

- name: Test Render Kickstart Files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/var/tmp/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  loop: "{{ forge_profiles_rhel_profiles.values() | map(attribute='kickstartbase') | unique | list }}"


